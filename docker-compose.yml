services:
  vms-analytics-demo:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: portfolio-vms-analytics-demo:cuda
    container_name: portfolio-vms-analytics-demo
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      VMS_DATA_DIR: /app/data
      VMS_SESSION_TIMEOUT_S: "300"
      VMS_ANALYSIS_FPS: "2"
      VMS_YOLO_MODEL: yolov8n.pt
      VMS_YOLO_DEVICE: auto
      VMS_SESSION_SECRET: change-me-before-deploy
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./data:/app/data
      - ./models:/app/models

